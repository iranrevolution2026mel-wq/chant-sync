<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chant Sync</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="app" class="app">
    <section id="loadingPanel" class="loading-panel">
      <div class="loading-title">Loading chant sequence…</div>
      <div id="loadingStatus" class="loading-text">Reading chant file</div>
    </section>

    <div class="topbar">
      <div class="status-group">
        <div class="label">Status</div>
        <div id="status" class="status">Loading…</div>
      </div>

      <div class="status-group">
        <div class="label">Current line</div>
        <div id="lineInfo" class="small-text">—</div>
      </div>

      <div class="status-group">
        <div class="label">Loop position</div>
        <div id="loopInfo" class="small-text">—</div>
      </div>
    </div>

    <section class="current-section">
      <div class="label big-label">Current chant</div>
      <div id="currentChant" class="current-chant">Waiting…</div>
    </section>

    <section class="countdown-section">
      <div class="label">Next change in</div>
      <div id="countdown" class="countdown">—</div>
      <div class="progress-wrap">
        <div id="progressBar" class="progress-bar"></div>
      </div>
    </section>

    <section class="next-section">
      <div class="label">Next chant</div>
      <div id="nextChant" class="next-chant">—</div>
    </section>

    <section class="footer-section">
      <div class="label">Sequence info</div>
      <div id="sequenceInfo" class="instructions">—</div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
